<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>cetex.dev</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#12151b; --muted:#5b6472;
    --line:#e6e9ee; --accent:#1f9d78; --accent-soft:#e7f5ef; --ring:rgba(31,157,120,.35);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0b0d12; --panel:#12151c; --ink:#eceff4; --muted:#8b94a3;
      --line:#1e232d; --accent:#3ddc97; --accent-soft:#0f1f19; --ring:rgba(61,220,151,.28);
    }
  }
  :root[data-theme="light"]{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#12151b; --muted:#5b6472;
    --line:#e6e9ee; --accent:#1f9d78; --accent-soft:#e7f5ef; --ring:rgba(31,157,120,.35);
  }
  :root[data-theme="dark"]{
    --bg:#0b0d12; --panel:#12151c; --ink:#eceff4; --muted:#8b94a3;
    --line:#1e232d; --accent:#3ddc97; --accent-soft:#0f1f19; --ring:rgba(61,220,151,.28);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:var(--sans); color:var(--ink); background:var(--bg);
    display:grid; place-items:center; padding:24px;
    background-image:
      radial-gradient(1100px 520px at 50% -10%, var(--accent-soft), transparent 60%),
      linear-gradient(transparent 0 0);
  }
  .card{
    width:100%; max-width:460px; background:var(--panel);
    border:1px solid var(--line); border-radius:18px;
    padding:40px 34px 30px; text-align:center;
    box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 24px 60px -30px rgba(0,0,0,.5);
  }
  .mark{
    font-family:var(--mono); font-size:13px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted); margin-bottom:22px;
  }
  .domain{
    font-family:var(--mono); font-size:clamp(28px,7vw,40px); font-weight:600;
    letter-spacing:-.01em; margin:0; line-height:1.05;
  }
  .domain .dot{color:var(--accent)}
  .status{
    display:inline-flex; align-items:center; gap:9px; margin-top:26px;
    padding:8px 15px; border:1px solid var(--line); border-radius:999px;
    background:var(--accent-soft); font-size:14px; color:var(--ink);
  }
  .pulse{position:relative; width:9px; height:9px}
  .pulse::before,.pulse::after{content:""; position:absolute; inset:0; border-radius:50%; background:var(--accent)}
  .pulse::after{animation:pulse 2s ease-out infinite}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(3.2);opacity:0}}
  @media (prefers-reduced-motion:reduce){.pulse::after{animation:none}}
  .desc{color:var(--muted); font-size:14.5px; line-height:1.6; margin:24px auto 0; max-width:36ch}
  .rule{height:1px; background:var(--line); margin:26px 0 16px}
  .foot{font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:.04em}
</style>
</head>
<body>
  <main class="card">
    <div class="mark">Serverio pagrindinis</div>
    <h1 class="domain">cetex<span class="dot">.</span>dev</h1>
    <div class="status"><span class="pulse"></span> Serveris veikia</div>
    <p class="desc">Šis serveris talpina kelis nepriklausomus projektus. Čia nėra viešo turinio — kiekvienas projektas pasiekiamas savo domenu.</p>
    <div class="rule"></div>
    <div class="foot">cetex.dev · infrastruktūra</div>
  </main>
</body>
</html>
