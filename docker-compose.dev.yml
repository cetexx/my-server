# Lokali development infrastruktūra
#
# Paleidimas:
#   docker compose -f docker-compose.dev.yml up -d
#
# Projektai jungiasi per:
#   DATABASE_URL=postgresql://admin:admin@localhost:15432/mano_app
#   REDIS_URL=redis://:devpass@localhost:16379
#   PLAYWRIGHT_WS=ws://localhost:3000?token=dev-token
#   Adminer: http://localhost:18080

name: localhost

services:
  postgresql:
    container_name: localhost-postgresql
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: default
    ports:
      - "15432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    container_name: localhost-redis
    image: redis:7-alpine
    command: redis-server --requirepass devpass --appendonly yes
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data

  playwright:
    container_name: localhost-playwright
    image: browserless/chromium:latest
    environment:
      MAX_CONCURRENT_SESSIONS: "5"
      TOKEN: "dev-token"
    ports:
      - "3000:3000"

  adminer:
    container_name: localhost-adminer
    image: adminer:4
    environment:
      ADMINER_DEFAULT_SERVER: postgresql
      ADMINER_DESIGN: dracula
    ports:
      - "18080:8080"

volumes:
  pg-data:
  redis-data:
