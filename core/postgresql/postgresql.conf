# =============================================
# PostgreSQL 17 tuning — 16GB RAM VPS, 4 vCPU
# =============================================

# Network — accept connections from the Docker Swarm overlay network.
# The postgres:alpine image's entrypoint sets this to '*' by default,
# but mounting a custom postgresql.conf overrides that default to
# 'localhost', which stops every containerized service (grafana,
# pickzy-api, etc.) from connecting. Keep this line or reintroduce
# the services-can't-reach-Postgres bug. Auth is still gated by
# pg_hba.conf + SCRAM.
listen_addresses = '*'

# Atmintis
shared_buffers = 4GB
effective_cache_size = 12GB
work_mem = 64MB
maintenance_work_mem = 512MB
wal_buffers = 64MB

# CPU
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_worker_processes = 8

# Connections
max_connections = 200
superuser_reserved_connections = 5

# WAL
wal_level = replica
checkpoint_completion_target = 0.9
min_wal_size = 256MB
max_wal_size = 2GB

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# Autovacuum
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 60
