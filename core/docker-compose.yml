version: "3.8"

services:
  traefik:
    # Pinned to v3.6 (currently running v3.6.12). Floating `:v3` silently
    # advanced major lines in the past and introduced Docker API
    # incompatibilities — a `docker stack deploy` once pulled a newer image
    # that couldn't talk to the local daemon. Bump this pin intentionally
    # when upgrading; don't rely on the tag moving.
    image: traefik:v3.6.12
    command:
      - --api.dashboard=true
      # `ping` exposes /ping for the built-in `traefik healthcheck` CLI;
      # without it the compose-level healthcheck in this file reports
      # "please enable `ping` to use health check" and the service
      # never converges.
      - --ping=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=traefik-public
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --metrics.prometheus=true
      - --entrypoints.metrics.address=:8082
      - --log.level=INFO
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    healthcheck:
      # `traefik healthcheck` without args probes the API endpoint first
      # and errors "please enable ping" when the API isn't exposed. Pass
      # `--ping` so it hits /ping directly (which we enabled via the
      # `--ping=true` command flag).
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/my-server/traefik/acme:/acme
    networks:
      - traefik-public
      - internal
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        # Admin IP whitelist middleware (naudojamas visų admin servisų)
        - traefik.http.middlewares.admin-whitelist.ipallowlist.sourcerange=${ADMIN_WHITELIST_IPS}
        # Rate limit middleware viešiems servisams (100 req/s, burst 50)
        - traefik.http.middlewares.rate-limit.ratelimit.average=100
        - traefik.http.middlewares.rate-limit.ratelimit.burst=50
        - traefik.http.middlewares.rate-limit.ratelimit.period=1s
        # Dashboard
        - traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)
        - traefik.http.routers.traefik-dashboard.entrypoints=websecure
        - traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt
        - traefik.http.routers.traefik-dashboard.service=api@internal
        - traefik.http.routers.traefik-dashboard.middlewares=admin-whitelist
        - traefik.http.services.traefik-dashboard.loadbalancer.server.port=8080
        # Swarm provider auto-creates a service named `core-traefik`
        # from the swarm service name. It errors "port is missing" if
        # we don't explicitly bind it, even though no router references
        # this auto-service (`traefik-dashboard` is the only real one).
        # Point it at the same admin port to silence the log spam.
        - traefik.http.services.core-traefik.loadbalancer.server.port=8080

  postgresql:
    # Pinned to the minor. Point-upgrades are routine (17.9 → 17.10)
    # and bump this when doing a planned upgrade.
    image: postgres:17.9-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ROUNDCUBE_DB_PASSWORD: ${ROUNDCUBE_DB_PASSWORD}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD}
      POSTGRES_EXPORTER_PASSWORD: ${POSTGRES_EXPORTER_PASSWORD}
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - /opt/my-server/postgresql/data:/var/lib/postgresql/data
    configs:
      - source: init-databases
        target: /docker-entrypoint-initdb.d/init-databases.sh
        mode: 0755
      - source: pg-tuning
        target: /etc/postgresql/postgresql.conf
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  redis:
    image: redis:7.4.8-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - /opt/my-server/redis/data:/data
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  portainer:
    # Bumped 2.21.5 → 2.32.0: the on-disk BoltDB schema had been
    # migrated by a previous newer Portainer (evidence: 2.21.5 fatals
    # "database schema version does not align with server version" on
    # startup). Modern Portainer opens the newer DB fine.
    image: portainer/portainer-ce:2.32.0
    command: -H unix:///var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/my-server/portainer/data:/data
    networks:
      - traefik-public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)
        - traefik.http.routers.portainer.entrypoints=websecure
        - traefik.http.routers.portainer.tls.certresolver=letsencrypt
        - traefik.http.routers.portainer.middlewares=admin-whitelist
        - traefik.http.services.portainer.loadbalancer.server.port=9000

  adminer:
    image: adminer:4.8.1-standalone
    healthcheck:
      # Adminer's :4-standalone variant is PHP's built-in dev server
      # with no curl. Use wget (busybox ships it) via CMD-SHELL so the
      # OR-exit works — a plain `wget --spider` exits 0/1 cleanly.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      ADMINER_DEFAULT_SERVER: core_postgresql
      ADMINER_DESIGN: dracula
    networks:
      - traefik-public
      - internal
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.http.routers.adminer.rule=Host(`adminer.${DOMAIN}`)
        - traefik.http.routers.adminer.entrypoints=websecure
        - traefik.http.routers.adminer.tls.certresolver=letsencrypt
        - traefik.http.routers.adminer.middlewares=admin-whitelist
        - traefik.http.services.adminer.loadbalancer.server.port=8080

  playwright:
    # Pin the current SHA — browserless pushes `:latest` over any
    # backward-incompatible API change without a heads-up. The running
    # image came from ghcr.io; use the same registry for reproducibility.
    image: ghcr.io/browserless/chromium:latest@sha256:57a1edb1f76e56cf1f128a2c379381df9d937e643c2cf562d76463b0280c24c4
    environment:
      MAX_CONCURRENT_SESSIONS: "5"
      MAX_QUEUE_LENGTH: "10"
      DEFAULT_LAUNCH_ARGS: '["--disable-gpu","--no-sandbox","--disable-dev-shm-usage"]'
      TIMEOUT: "60000"
      TOKEN: ${PLAYWRIGHT_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/json/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - traefik-public
      - internal
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.http.routers.playwright.rule=Host(`playwright.${DOMAIN}`)
        - traefik.http.routers.playwright.entrypoints=websecure
        - traefik.http.routers.playwright.tls.certresolver=letsencrypt
        - traefik.http.routers.playwright.middlewares=admin-whitelist
        - traefik.http.services.playwright.loadbalancer.server.port=3000

  shepherd:
    # Currently running but has no work: pickzy-food services no longer
    # carry `shepherd.enable=true` since we moved to manual button-release.
    # Consider removing this service entirely if no other stack on this
    # host uses label-based auto-update. SHA-pinned so a `:latest` shift
    # doesn't reintroduce the "ghcr.io unauthorized" log spam.
    image: containrrr/shepherd:latest@sha256:b117c2394832e088932d5e1eebb8df6c1924f47d0fef31788cb310c0fe3bf7db
    environment:
      TZ: "Europe/Vilnius"
      SLEEP_TIME: "15m"
      FILTER_SERVICES: "label=shepherd.enable=true"
      VERBOSE: "true"
      ROLLBACK_ON_FAILURE: "true"
      IMAGE_AUTOCLEAN_LIMIT: "5"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
      placement:
        constraints:
          - node.role == manager

configs:
  init-databases:
    file: ./init-db/init-databases.sh
  # Docker Swarm configs are immutable after creation — content can't be
  # updated in place, only replaced by a new config with a different
  # name. Bump the name suffix whenever postgresql.conf changes so the
  # stack deploy swaps the reference. Previous `core_pg-tuning` shipped
  # empty and was never refreshable; `-v2` fixes that.
  pg-tuning:
    file: ./postgresql/postgresql.conf
    name: pg-tuning-v3

networks:
  traefik-public:
    external: true
  internal:
    external: true
