version: "3.8"

services:
  mailserver:
    # v15: SpamAssassin/Amavis/Postgrey pašalinti → Rspamd (spam + DKIM signing).
    image: ghcr.io/docker-mailserver/docker-mailserver:15.1.0
    hostname: mail.${MAIL_DOMAIN}
    environment:
      OVERRIDE_HOSTNAME: mail.${MAIL_DOMAIN}
      # Rspamd: spam filtravimas + DKIM pasirašymas (vietoj OpenDKIM). Reikia Redis —
      # ENABLE_RSPAMD_REDIS=1 paleidžia lokalų Redis konteineryje (izoliuota nuo core_redis).
      ENABLE_RSPAMD: "1"
      ENABLE_RSPAMD_REDIS: "1"
      ENABLE_OPENDKIM: "0"
      ENABLE_OPENDMARC: "0"
      ENABLE_CLAMAV: "0"
      ENABLE_FAIL2BAN: "0"
      # DMS skaito Traefik acme.json TIESIOGIAI (žr. volumes). mail.cetex.dev cert'ą
      # gauna Roundcube router'is (Host(mail.cetex.dev)). Jokio certs-dumper / ordering.
      SSL_TYPE: letsencrypt
      PERMIT_DOCKER: network
      POSTMASTER_ADDRESS: postmaster@${MAIL_DOMAIN}
    ports:
      - target: 25
        published: 25
        protocol: tcp
        mode: host
      - target: 587
        published: 587
        protocol: tcp
        mode: host
      - target: 993
        published: 993
        protocol: tcp
        mode: host
    volumes:
      - /opt/my-server/mailserver/data:/var/mail
      - /opt/my-server/mailserver/state:/var/mail-state
      - /opt/my-server/mailserver/logs:/var/log/mail
      - /opt/my-server/mailserver/config:/tmp/docker-mailserver
      - /opt/my-server/traefik/acme/acme.json:/etc/letsencrypt/acme.json:ro
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  roundcube:
    image: roundcube/roundcubemail:1.6.17-apache
    environment:
      ROUNDCUBEMAIL_DB_TYPE: pgsql
      ROUNDCUBEMAIL_DB_HOST: core_postgresql
      ROUNDCUBEMAIL_DB_PORT: "5432"
      ROUNDCUBEMAIL_DB_NAME: roundcube
      ROUNDCUBEMAIL_DB_USER: roundcube
      ROUNDCUBEMAIL_DB_PASSWORD: ${ROUNDCUBE_DB_PASSWORD}
      ROUNDCUBEMAIL_DEFAULT_HOST: tls://mailserver
      ROUNDCUBEMAIL_DEFAULT_PORT: "143"
      ROUNDCUBEMAIL_SMTP_SERVER: tls://mailserver
      ROUNDCUBEMAIL_SMTP_PORT: "587"
    networks:
      - traefik-public
      - internal
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - traefik.enable=true
        # Vienas neutralus webmail host visiems (mail.$MAIL_DOMAIN = mail.cetex.dev).
        # Vartotojas jungiasi PILNU email adresu (info@natars.mobi, info@xheroes.agency).
        # Nori vanity URL (mail.<projektas>)? Pridėk `|| Host(`mail.<domenas>`)` + cert SAN.
        - traefik.http.routers.roundcube.rule=Host(`mail.${MAIL_DOMAIN}`)
        - traefik.http.routers.roundcube.entrypoints=websecure
        - traefik.http.routers.roundcube.tls.certresolver=letsencrypt
        - traefik.http.routers.roundcube.middlewares=rate-limit
        - traefik.http.services.roundcube.loadbalancer.server.port=80

networks:
  traefik-public:
    external: true
  internal:
    external: true
