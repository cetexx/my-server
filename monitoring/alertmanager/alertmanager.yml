global:
  # Siunčiam per vidinį mail serverį (PERMIT_DOCKER=network leidžia be auth)
  smtp_smarthost: 'mail_mailserver:25'
  smtp_from: 'alertmanager@example.com'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email'

  routes:
    # Critical — siųsti iš karto
    - match:
        severity: critical
      group_wait: 10s
      repeat_interval: 1h
      receiver: 'email'

receivers:
  - name: 'email'
    email_configs:
      - to: 'sarunas.pm@gmail.com, cetex.pm@gmail.com'
        send_resolved: true
        headers:
          Subject: '{{ if eq .Status "firing" }}[ALERT] {{ .CommonLabels.alertname }}{{ else }}[OK] {{ .CommonLabels.alertname }}{{ end }}'

inhibit_rules:
  # Jei critical aktyvus — nesiųsti warning to paties alerto
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
