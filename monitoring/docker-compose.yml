version: "3.8"

services:
  prometheus:
    image: prom/prometheus:v2.55.1  # latest v2.x; v3.x is a breaking change (keep for a planned upgrade)
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - /opt/my-server/prometheus/data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
      - source: alert-rules
        target: /etc/prometheus/alert-rules.yml
    networks:
      - internal
      - traefik-public
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)
        - traefik.http.routers.prometheus.entrypoints=websecure
        - traefik.http.routers.prometheus.tls.certresolver=letsencrypt
        - traefik.http.routers.prometheus.middlewares=admin-whitelist
        - traefik.http.services.prometheus.loadbalancer.server.port=9090

  grafana:
    image: grafana/grafana:11.6.0  # staying on the 11.x LTS line; v12/v13 are separate majors
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: core_postgresql:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD}
      GF_DATABASE_SSL_MODE: disable
    volumes:
      - /opt/my-server/grafana/data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    configs:
      - source: grafana-datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
      - source: grafana-dashboard-provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
      - source: dashboard-node
        target: /var/lib/grafana/dashboards/node-exporter.json
      - source: dashboard-docker
        target: /var/lib/grafana/dashboards/docker.json
      - source: dashboard-postgresql
        target: /var/lib/grafana/dashboards/postgresql.json
      - source: dashboard-traefik
        target: /var/lib/grafana/dashboards/traefik.json
    networks:
      - internal
      - traefik-public
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)
        - traefik.http.routers.grafana.entrypoints=websecure
        - traefik.http.routers.grafana.tls.certresolver=letsencrypt
        - traefik.http.routers.grafana.middlewares=admin-whitelist
        - traefik.http.services.grafana.loadbalancer.server.port=3000

  node-exporter:
    image: prom/node-exporter:v1.9.1
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - internal
    deploy:
      mode: global

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1  # conservative bump; v0.56+ requires testing first
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal
    deploy:
      mode: global
      resources:
        limits:
          memory: 256M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_URI: core_postgresql:5432/postgres?sslmode=disable
      DATA_SOURCE_USER: postgres_exporter
      DATA_SOURCE_PASS: ${POSTGRES_EXPORTER_PASSWORD}
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    configs:
      - source: alertmanager-config
        target: /etc/alertmanager/alertmanager.yml
    networks:
      - internal
      - traefik-public
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
      labels:
        - traefik.enable=true
        - traefik.http.routers.alertmanager.rule=Host(`alerts.${DOMAIN}`)
        - traefik.http.routers.alertmanager.entrypoints=websecure
        - traefik.http.routers.alertmanager.tls.certresolver=letsencrypt
        - traefik.http.routers.alertmanager.middlewares=admin-whitelist
        - traefik.http.services.alertmanager.loadbalancer.server.port=9093

  dozzle:
    # Pinned to the latest v8 patch; Dozzle ships frequent UI changes
    # on the floating `:v8` tag, so always pin to a concrete version.
    image: amir20/dozzle:v8.14.9
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.dozzle.rule=Host(`logs.${DOMAIN}`)
        - traefik.http.routers.dozzle.entrypoints=websecure
        - traefik.http.routers.dozzle.tls.certresolver=letsencrypt
        - traefik.http.routers.dozzle.middlewares=admin-whitelist
        - traefik.http.services.dozzle.loadbalancer.server.port=8080

# Docker Swarm configs are immutable after creation — any content
# change needs a new config name. Version-suffix each entry and bump
# the suffix whenever the underlying file changes so stack deploy
# swaps the reference instead of erroring "only updates to Labels are
# allowed". Old unreferenced configs can be pruned with
# `docker config prune`.
configs:
  prometheus-config:
    file: ./prometheus/prometheus.yml
    name: prometheus-config-v2
  alert-rules:
    file: ./prometheus/alert-rules.yml
    name: alert-rules-v2
  alertmanager-config:
    file: ./alertmanager/alertmanager.yml
    name: alertmanager-config-v2
  grafana-datasource:
    file: ./grafana/provisioning/datasources/datasource.yml
    name: grafana-datasource-v2
  grafana-dashboard-provider:
    file: ./grafana/provisioning/dashboards/dashboards.yml
    name: grafana-dashboard-provider-v2
  dashboard-node:
    file: ./grafana/dashboards/node-exporter.json
    name: dashboard-node-v2
  dashboard-docker:
    file: ./grafana/dashboards/docker.json
    name: dashboard-docker-v2
  dashboard-postgresql:
    file: ./grafana/dashboards/postgresql.json
    name: dashboard-postgresql-v2
  dashboard-traefik:
    file: ./grafana/dashboards/traefik.json
    name: dashboard-traefik-v2

networks:
  traefik-public:
    external: true
  internal:
    external: true
