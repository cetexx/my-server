# Projekto šablonas Docker Swarm (su Varnish cache)
#
# Naudojimas:
#   1. Kopijuok: cp -r projects/example projects/my-app
#   2. Redaguok docker-compose.yml ir varnish.vcl
#   3. Deploy: ./deploy.sh projects/my-app
#
# Srautas: Traefik → Varnish (cache SSD) → App

version: "3.8"

services:
  varnish:
    image: varnish:7.6
    command:
      - -a :6081
      - -f /etc/varnish/default.vcl
      - -s file,/var/lib/varnish/storage,20G  # keisk pagal projekto poreikį
    configs:
      - source: varnish-vcl
        target: /etc/varnish/default.vcl
    volumes:
      - varnish-cache:/var/lib/varnish
    networks:
      - traefik-public
      - internal
    deploy:
      mode: replicated
      replicas: 1
      labels:
        # Traefik routina į Varnish, ne tiesiai į app
        - traefik.enable=true
        - traefik.http.routers.example.rule=Host(`example.${DOMAIN}`)
        - traefik.http.routers.example.entrypoints=websecure
        - traefik.http.routers.example.tls.certresolver=letsencrypt
        - traefik.http.services.example.loadbalancer.server.port=6081
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  app:
    image: nginx:alpine  # Pakeisk į savo app image
    # environment:
    #   DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@core_postgresql:5432/my_app_db
    #   REDIS_URL: redis://:${REDIS_PASSWORD}@core_redis:6379
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

configs:
  varnish-vcl:
    file: ./varnish.vcl

volumes:
  varnish-cache:
    driver: local

networks:
  traefik-public:
    external: true
  internal:
    external: true
