# Pickzy Food — Production (Docker Swarm)
#
# Prereqs: core stack running (postgresql, redis, playwright on internal network)
# Deploy:  make deploy

services:
  api:
    image: ghcr.io/pickzy-app/food-api:${IMAGE_TAG:-latest}
    environment:
      APP_NAME: Pickzy
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_CONNECTION: pgsql
      DB_HOST: core_postgresql
      DB_PORT: 5432
      DB_DATABASE: pickzy_food
      DB_USERNAME: pickzy_food
      DB_PASSWORD: ${PICKZY_DB_PASSWORD}
      ADMIN_DB_DATABASE: pickzy_food_admin
      REDIS_CLIENT: predis
      REDIS_HOST: core_redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-r2}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY}
      CLOUDFLARE_R2_BUCKET: ${CLOUDFLARE_R2_BUCKET}
      CLOUDFLARE_R2_PUBLIC_URL: ${CLOUDFLARE_R2_PUBLIC_URL}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@pickzy.app}
      MAIL_FROM_NAME: Pickzy
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    networks:
      - traefik-public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - shepherd.enable=true
        - traefik.enable=true
        - traefik.http.routers.pickzy-food-api.rule=Host(`api.pickzy.app`)
        - traefik.http.routers.pickzy-food-api.entrypoints=websecure
        - traefik.http.routers.pickzy-food-api.tls=true
        - traefik.http.services.pickzy-food-api.loadbalancer.server.port=8000

  scraper:
    image: ghcr.io/pickzy-app/food-scraper:${IMAGE_TAG:-latest}
    environment:
      PLAYWRIGHT_WS: "ws://core_playwright:3000?token=${PLAYWRIGHT_TOKEN}"
      REDIS_HOST: core_redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DATABASE_URL: "postgres://pickzy_food:${PICKZY_DB_PASSWORD}@core_postgresql:5432/pickzy_food"
    networks:
      - internal
    command: node dist/worker.js
    deploy:
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - shepherd.enable=true

  landing:
    image: ghcr.io/pickzy-app/food-landing:${IMAGE_TAG:-latest}
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - shepherd.enable=true
        - traefik.enable=true
        - traefik.http.routers.pickzy-food-landing.rule=Host(`pickzy.app`)
        - traefik.http.routers.pickzy-food-landing.entrypoints=websecure
        - traefik.http.routers.pickzy-food-landing.tls=true
        - traefik.http.services.pickzy-food-landing.loadbalancer.server.port=80

networks:
  traefik-public:
    external: true
  internal:
    external: true
